<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kariyer Analizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Kariyer Planlama</h1>

        <div class="card">
            <h2>1. Kendinizi Tanitin</h2>
            <p>Neler yapmayi seversin?</p>
            <input type="text" id="userInput" placeholder="Hobilerini veya ilgilerini yaz...">
            <button id="analyzeBtn" class="primary-btn">Tikla</button>
        </div>

        <div class="card">
            <h2>2. Kariyer Önerileri</h2>
            <p>Yukaridaki kelimelere göre sana uygun meslekler:</p>
            <div id="suggestionBox">
                <span class="empty-text">Henüz analiz yapilmadi.</span>
            </div>
        </div>

        <div class="card">
            <h2>3. Seçtiğim Hedefler</h2>
            <ul id="myCareerList">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
